<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tráfico LP{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    /* ── Paleta Mini Metro ─────────────────────────────────────── */
    :root {
      --bg:      #f5f0e8;
      --surface: #ffffff;
      --border:  #e3ddd4;
      --text:    #1a1a1a;
      --muted:   #8a8078;
      --red:     #e02020;   /* línea roja  — alta congestión */
      --green:   #1a9e5c;   /* línea verde — baja congestión */
      --blue:    #1565c0;   /* línea azul  — interactivo */
      --yellow:  #f4b942;   /* línea amarilla — warning/estimado */
      --orange:  #e87722;   /* línea naranja — PCA / métodos */
      --radius:  2px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ─────────────────────────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 54px;
      background: var(--surface);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      /* borde inferior = multilinea de metro */
      border-bottom: none;
    }
    /* Las "líneas" de metro debajo del topbar */
    .topbar::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(to right,
        var(--red)    0%   28%,
        var(--green)  28%  56%,
        var(--blue)   56%  84%,
        var(--yellow) 84% 100%
      );
    }

    .topbar-brand { display: flex; align-items: baseline; gap: 10px; }
    .topbar-name  { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .topbar-loc   { font-size: 12px; color: var(--muted); }

    .topbar-pills { display: flex; gap: 6px; }
    .topbar-pill  {
      font-size: 11px; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 10px; font-weight: 500;
    }

    /* ── Tab nav ────────────────────────────────────────────────── */
    .tab-nav {
      position: fixed; top: 54px; left: 0; right: 0; z-index: 999;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; padding: 0 28px;
    }
    .tab-btn {
      padding: 11px 20px 10px;
      font-size: 13px; font-weight: 500; font-family: inherit;
      border: none; border-bottom: 3px solid transparent;
      background: transparent; color: var(--muted);
      cursor: pointer; transition: color .12s, border-color .12s;
    }
    .tab-btn:hover { color: var(--text); }
    /* Cada tab activo usa su color de "línea" */
    .tab-btn[data-tab="mapa"].active     { color: var(--blue);   border-bottom-color: var(--blue);   font-weight: 700; }
    .tab-btn[data-tab="clusters"].active { color: var(--green);  border-bottom-color: var(--green);  font-weight: 700; }
    .tab-btn[data-tab="metodos"].active  { color: var(--orange); border-bottom-color: var(--orange); font-weight: 700; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .page-body  { padding-top: 111px; }
    .tab-pane   { display: none; }
    .tab-pane.active { display: block; }
    .sidebar-col { position: sticky; top: 128px; align-self: flex-start; }

    /* ── Cards ──────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: none;
    }
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      padding: 11px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }

    /* ── Form ───────────────────────────────────────────────────── */
    .field-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      display: block; margin-bottom: 5px;
    }
    .form-select, .form-control {
      font-size: 13px; font-family: inherit;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg); color: var(--text); padding: 6px 10px;
    }
    .form-select:focus, .form-control:focus {
      border-color: var(--blue); box-shadow: none; outline: none;
      background: var(--surface);
    }

    /* ── Slider estilo "línea de metro" ─────────────────────────── */
    .metro-slider-wrap { position: relative; padding: 4px 0; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px;
      border-radius: 2px; outline: none; cursor: pointer;
      background: linear-gradient(to right, var(--blue) var(--pct, 33%), var(--border) var(--pct, 33%));
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--surface);
      border: 3px solid var(--blue);
      transition: border-color .1s, transform .1s;
    }
    input[type=range]:hover::-webkit-slider-thumb {
      border-color: var(--text); transform: scale(1.15);
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--surface); border: 3px solid var(--blue);
    }

    /* ── Hora grande ────────────────────────────────────────────── */
    .hora-big {
      font-size: 36px; font-weight: 700; letter-spacing: -1px;
      line-height: 1; color: var(--text); text-align: center;
      padding: 8px 0 2px;
    }
    .hora-big span { font-size: 13px; font-weight: 400; color: var(--muted); letter-spacing: 0; }

    /* ── Botón principal ────────────────────────────────────────── */
    .btn-metro {
      width: 100%; padding: 9px;
      background: var(--blue); color: #fff; border: none;
      border-radius: var(--radius); font-family: inherit;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity .12s;
    }
    .btn-metro:hover { opacity: .88; }

    /* ── Métricas ───────────────────────────────────────────────── */
    .metric-row { display: flex; }
    .metric-cell {
      flex: 1; padding: 14px 8px; text-align: center;
      border-right: 1px solid var(--border);
    }
    .metric-cell:last-child { border-right: none; }
    .metric-value {
      font-size: 22px; font-weight: 700; color: var(--text);
      line-height: 1; letter-spacing: -.5px;
    }
    .metric-label { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 500; }

    /* ── Table ──────────────────────────────────────────────────── */
    .table { font-size: 13px; color: var(--text); font-family: inherit; }
    .table thead th {
      font-size: 10px; font-weight: 700; color: var(--muted);
      border-color: var(--border); background: transparent;
      padding: 8px 14px; letter-spacing: .2px;
    }
    .table tbody td { border-color: var(--border); padding: 9px 14px; vertical-align: middle; }
    .table tbody tr:hover { background: var(--bg); }

    /* ── Cluster dot-badges Mini Metro ──────────────────────────── */
    .dot-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500;
    }
    .dot-badge .station {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-alto { color: var(--red); }
    .dot-alto .station { background: var(--red); }
    .dot-bajo { color: var(--green); }
    .dot-bajo .station { background: var(--green); }

    /* ── Map iframe ─────────────────────────────────────────────── */
    #map-frame {
      border: none;
      border-radius: 0 0 var(--radius) var(--radius);
      width: 100%; height: 432px;
    }

    /* ── Mode toggle ────────────────────────────────────────────── */
    .mode-toggle {
      display: flex; gap: 0;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    .mode-btn {
      font-size: 11px; font-weight: 600; font-family: inherit;
      padding: 4px 12px; border: none;
      cursor: pointer; transition: background .1s, color .1s;
      background: transparent; color: var(--muted);
    }
    .mode-btn + .mode-btn { border-left: 1px solid var(--border); }
    .mode-btn.active { background: var(--blue); color: #fff; }

    /* ── Method cards ───────────────────────────────────────────── */
    /* Cada paso tiene su color de línea Mini Metro */
    .method-step { display: flex; gap: 20px; margin-bottom: 28px; }
    .method-line-col { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .method-station {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
      border: 3px solid; margin-top: 3px;
    }
    .method-connector {
      width: 3px; flex: 1; min-height: 20px; margin-top: 4px;
    }
    .method-body-col { flex: 1; padding-bottom: 4px; }
    .method-num   { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 3px; letter-spacing: .3px; }
    .method-title { font-size: 15px; font-weight: 700; margin-bottom: 7px; line-height: 1.2; }
    .method-desc  { font-size: 13px; color: var(--muted); line-height: 1.65; }
    .method-tag {
      display: inline-block;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; font-size: 11px; font-weight: 500;
      padding: 1px 9px; margin: 5px 3px 0 0; color: var(--text);
    }

    /* ── Warning día estimado ───────────────────────────────────── */
    #dia-warning {
      display: none; margin-top: 5px;
      font-size: 11px; font-weight: 500; color: var(--yellow);
      border-left: 2px solid var(--yellow);
      padding: 3px 0 3px 8px; line-height: 1.4;
    }

    /* ── Spinner ────────────────────────────────────────────────── */
    #spinner { display: none; align-items: center; gap: 6px; margin-top: 10px; }
    .spin-line {
      display: flex; gap: 3px;
    }
    .spin-dot {
      width: 5px; height: 5px; border-radius: 50%;
      animation: bounce .7s infinite alternate;
    }
    .spin-dot:nth-child(1){ background: var(--red);   animation-delay: 0s; }
    .spin-dot:nth-child(2){ background: var(--blue);  animation-delay: .15s; }
    .spin-dot:nth-child(3){ background: var(--green); animation-delay: .3s; }
    @keyframes bounce { to { transform: translateY(-4px); } }
    #spinner span { font-size: 11px; color: var(--muted); }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media (max-width: 768px) {
      .sidebar-col { position: static; }
      #map-frame   { height: 320px; }
      .topbar-pills { display: none; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <span class="topbar-name">Tráfico LP</span>
      <span class="topbar-loc">La Paz &amp; El Alto</span>
    </div>
    <div class="topbar-pills">
      <span class="topbar-pill">500 segmentos</span>
      <span class="topbar-pill">7 días</span>
      <span class="topbar-pill">Distance Matrix API</span>
    </div>
  </div>

  <!-- Tab nav -->
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="mapa">Mapa</button>
    <button class="tab-btn" data-tab="clusters">Clusters</button>
    <button class="tab-btn" data-tab="metodos">Métodos</button>
  </div>

  <div class="page-body">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* Tab switching */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        if (tab === 'clusters' && !window._clustersLoaded) loadClusters();
      });
    });

    /* Slider fill dinámico */
    function updateSliderFill(el) {
      const pct = ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1) + '%';
      el.style.setProperty('--pct', pct);
    }
    document.querySelectorAll('input[type=range]').forEach(el => {
      updateSliderFill(el);
      el.addEventListener('input', () => updateSliderFill(el));
    });
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
